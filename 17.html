<html>
    <head>
        <title>Arithmetic Operations using JS</title>
        <link rel="stylesheet" href="../css/17.css">
        


    </head>
    <body>
        <!-- Header section -->
        <div class="header">
            <h2>Deep Upadhaya</h2>
        </div>
        <!-- Content section -->
        <div class="content">
            <div class="calc">
                <div class="UI">
                    <div class="heading">
                        <h1>Calculator</h1>
                    </div>
                    <div class="input">
                        <input type="number" id="num1" placeholder="Enter first number">
                        <input type="number" id="num2" placeholder="Enter second number">
                    </div>
                    <div class="buttons">
                        <button class="add" onclick = "sum()">Add</button>
                        <button class="sub" onclick = "sub()">Subtract</button>
                        <button class="pro" onclick = "pro()">Multiply</button>
                        <button class="div" onclick = "div()">Divide</button>
                    </div>
                    <div class="result">
                        <div id="resultDisplay">
                            
                        </div>
                    </div>
                </div>
            </div>
            <div class="arithmetic">
                <script>
                    function sum(){
                        let num1 = Number(document.getElementById("num1").value);
                        let num2 = Number(document.getElementById("num2").value);
                        console.log(num1);

                        let sum_ = num1 + num2; 
                        document.getElementById("resultDisplay").innerText = sum_;
                    }
                    function sub(){
                        let num1 = Number(document.getElementById("num1").value);
                        let num2 = Number(document.getElementById("num2").value);
                        let sub_ = num1 - num2; 
                        document.getElementById("resultDisplay").innerText = sub_;
                    }
                    function pro(){
                        let num1 = Number(document.getElementById("num1").value);
                        let num2 = Number(document.getElementById("num2").value);
                        let pro_ = num1 * num2; 
                        document.getElementById("resultDisplay").innerText = pro_;
                    }
                    function div(){
                        let num1 = Number(document.getElementById("num1").value);
                        let num2 = Number(document.getElementById("num2").value);
                        let div_ = num1 / num2; 
                        document.getElementById("resultDisplay").innerText = div_;
                    }
                </script>
            </div>    
            </div>
            
        </div>
        <!-- Footer section -->
        <div class="footer">
            Copyrights &copy;Deep
        </div>
    </body>
</html>
